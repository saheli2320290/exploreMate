<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ExploreMate</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <nav>
        <div class="logo"><span class="icon">🌐</span> ExploreMate</div>
        <ul class="nav-links">
            <li><a href="Home.html">Home</a></li>
        </ul>
    </nav>
</header>

<main class="auth-container">
    <div class="auth-box">

        <h2>Sign In</h2>

        <div id="msg"></div>
        <form action="login.php" method="POST">

            <select name="user_level" required>
                <option value="" disabled selected>Select User Level</option>
                <option value="user">USER</option>
                <option value="admin">ADMIN</option>
            </select>

            <input type="text" name="username" placeholder="Username" required>

            <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="********" required>
                <button type="button" class="toggle-btn" onclick="togglePassword()">👁</button>
            </div>

            <button type="submit" class="btn primary">Sign In</button>

        </form>

        <p>Don't have an account? <a href="SignUpPage.html">Sign Up</a></p>

    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);

if(params.get("error") === "login"){
    document.getElementById("msg").innerHTML = 
    "<p style='color:red;text-align:center;'>Invalid login details or wrong user level!</p>";
}
function togglePassword() {
    const passwordField = document.getElementById("password");

    if (passwordField.type === "password") {
        passwordField.type = "text";
    } else {
        passwordField.type = "password";
    }
}
</script>

</body>
</html>
